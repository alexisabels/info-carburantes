<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale=1 + user-scalable=no desactivan el pinch-zoom del
       NAVEGADOR a nivel de página. Leaflet mantiene su pinch-zoom propio
       sobre el mapa porque captura los eventos touch directamente, así
       que el efecto neto es: pinch sobre el mapa hace zoom del mapa,
       pinch fuera del mapa (sobre tarjetas, popups, listas) no hace
       nada — comportamiento nativo de apps móviles. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Carburantes — Precios de gasolineras en España</title>
  <meta name="description"
    content="Consulta precios actualizados de gasolina y diésel en estaciones de servicio de España. Encuentra la gasolinera más barata cerca de ti en tiempo real." />
  <meta name="author" content="alexisabel" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/gas.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180" />
  <link rel="mask-icon" href="/gas.svg" color="#0a0a0a" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <meta name="theme-color" content="#ffffff" />

  <script>
    // Resolución de tema previa al primer paint para evitar el FOUC: leemos
    // la preferencia persistida y aplicamos data-theme al <html> antes de
    // que React tenga oportunidad de pintar nada.
    (function () {
      try {
        var pref = localStorage.getItem("theme.preference");
        if (pref !== "light" && pref !== "dark" && pref !== "system") pref = "system";
        var theme = pref;
        if (pref === "system") {
          theme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.setAttribute("data-theme", theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === "dark" ? "#0a0a0a" : "#ffffff");
      } catch (e) {
        // localStorage o matchMedia no disponibles: caemos al tema claro.
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>

  <!-- Open Graph (rich link preview en WhatsApp, Telegram, Slack, FB, etc.) -->
  <meta property="og:title" content="Carburantes — Precios de gasolineras en España" />
  <meta property="og:description"
    content="Consulta precios actualizados de gasolina y diésel en estaciones de servicio de España. Encuentra la gasolinera más barata cerca de ti en tiempo real." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_ES" />
  <meta property="og:site_name" content="Carburantes" />
  <meta property="og:url" content="%VITE_SITE_URL%/" />
  <meta property="og:image" content="%VITE_SITE_URL%/pwa-512x512.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="Carburantes" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Carburantes — Precios de gasolineras en España" />
  <meta name="twitter:description"
    content="Consulta precios actualizados de gasolina y diésel en estaciones de servicio de España." />
  <meta name="twitter:image" content="%VITE_SITE_URL%/pwa-512x512.png" />

  <!-- Geist: preconnect + preload + stylesheet (no bloqueante en CSS principal). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&display=swap">
</head>

<body>
  <div id="root"></div>

</body>

</html>
